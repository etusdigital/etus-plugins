# How to Use This File

## 1. Initialize New Project

```bash
# When starting a new project:
1. Copy ids.yml to project root
2. Update registry:
   - product: "your-product"
   - namespace: "your-namespace"
   - owner: "your-name"
   - updated: "2026-03-14"
3. Start with sequences zeroed
4. As you create docs, increment sequences
```

## 2. During Discovery

```bash
# Generate BO-1, BO-2, etc. in product-vision.md
registry.sequences.bo: 1, 2, 3, ...
```

## 3. During Planning

```bash
# Generate PRD-F-1, US-1, FS-[kebab]-1, etc.
registry.sequences.prd-f: 1, 2, 3, ...
registry.sequences.us: 1, 2, 3, ...
# FS-[kebab]-# is INDEPENDENT per feature (can reset per feature)
```

## 4. Before Each Gate

```bash
# Use the checklist corresponding to the phase
# If any item is [ ], do not pass the gate
# If all are [x], you are ready to advance
```

## 5. Continuous Validation

```bash
# Hooks (post-document-save.sh) will check:
- No "Given/When/Then" outside user-stories.md
- No "NFR-" defined outside tech-spec.md
- No "dict." defined outside data-dictionary.md
- No "ev." defined outside data-dictionary.md
- No "tok." defined outside style-guide.md
- No "CREATE TABLE" outside database-spec.md
```

